<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FWC 2026 — Family Schedule</title>
<style>
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2436;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f4ff;
  --muted: #8b97b0;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --gold: #f59e0b;
  --gold2: #fbbf24;
  --clash-bg: rgba(245,158,11,0.10);
  --clash-border: rgba(245,158,11,0.50);
  --live-green: #10b981;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #0d1b3e 0%, #1a0a2e 50%, #0a1628 100%);
  border-bottom: 1px solid var(--border2);
  padding: 0 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.85rem 0;
  flex-wrap: wrap;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-trophy { font-size: 22px; }
.brand-text h1 {
  font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text); white-space: nowrap;
}
.brand-text p {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.header-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.pill-btn {
  padding: 6px 14px; border-radius: 999px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.pill-btn:hover { border-color: var(--accent); color: var(--accent2); }
.pill-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.pill-btn.clash-btn.active { background: var(--gold); border-color: var(--gold); color: #0a0f1e; }

/* CLUB MODE BUTTON + DROPDOWN */
.club-mode-wrap { position: relative; }
.club-btn {
  padding: 6px 14px; border-radius: 999px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.club-btn:hover { border-color: var(--accent); color: var(--accent2); }
.club-btn.arsenal-active { background: #EF0107 !important; border-color: #C6A84B !important; box-shadow: 0 0 0 2px #C6A84B; color: #fff !important; font-weight: 600; }
.club-btn.spurs-active   { background: #132257 !important; border-color: #ADD8E6 !important; box-shadow: 0 0 0 2px #ADD8E6; color: #fff !important; font-weight: 600; }
.club-btn.chelsea-active { background: #034694 !important; border-color: #C8A84B !important; box-shadow: 0 0 0 2px #C8A84B; color: #fff !important; font-weight: 600; }
.club-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #1a2436;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 6px;
  z-index: 500;
  min-width: 170px;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5);
}
.club-dropdown.open { display: flex; }
.club-option {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 13px; border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer; font-size: 13px; font-weight: 600;
  transition: all 0.15s; text-align: left; width: 100%;
}
.club-option.arsenal-option { background: #EF0107; color: #fff; }
.club-option.arsenal-option:hover { background: #c40006; }
.club-option.arsenal-option.active { border-color: #C6A84B; box-shadow: 0 0 0 2px rgba(198,168,75,0.4); }
.club-option.spurs-option   { background: #132257; color: #fff; }
.club-option.spurs-option:hover { background: #0d1a42; }
.club-option.spurs-option.active { border-color: #ADD8E6; box-shadow: 0 0 0 2px rgba(173,216,230,0.4); }
.club-option.chelsea-option { background: #034694; color: #fff; }
.club-option.chelsea-option:hover { background: #023070; }
.club-option.chelsea-option.active { border-color: #C8A84B; box-shadow: 0 0 0 2px rgba(200,168,75,0.4); }

/* HERO */
.hero {
  background: linear-gradient(135deg, #0d1b3e 0%, #1a0a2e 100%);
  padding: 1.75rem 1.5rem 1.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  transition: background 0.5s ease, border-bottom-color 0.4s ease;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
  transition: color 0.4s ease;
}
.hero-title {
  font-size: clamp(40px, 10vw, 88px); font-weight: 900;
  letter-spacing: -0.04em; line-height: 1;
  color: var(--text); margin-bottom: 1.25rem;
  transition: color 0.4s ease;
}

/* TEAM FILTER PILL SCROLLER */
.team-filter-wrap {
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
  padding: 6px 0;
  cursor: grab;
}
.team-filter-wrap::-webkit-scrollbar { display: none; }
.team-filter-wrap:active { cursor: grabbing; }
.team-filter-track {
  display: flex;
  gap: 8px;
  width: max-content;
  align-items: flex-start;
  padding: 0 5%;
}
.team-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 999px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; color: var(--text);
  cursor: pointer; transition: all 0.16s; user-select: none;
  flex-direction: column; align-items: flex-start;
}
.team-pill:hover { border-color: var(--accent2); color: var(--accent2); }
.team-pill.selected {
  background: rgba(59,130,246,0.18);
  border-color: var(--accent);
  color: var(--accent2);
}
.pill-main { display: flex; align-items: center; gap: 5px; }
.pill-flag { font-size: 15px; line-height: 1; }
.pill-person { color: var(--muted); font-size: 10px; margin-left: 1px; }
.team-pill.selected .pill-person { color: var(--accent2); opacity: 0.8; }
.pill-next {
  font-size: 10px; color: var(--gold2); font-weight: 600;
  padding-left: 2px; line-height: 1.3;
  display: flex; align-items: center; gap: 3px;
}
.pill-next-dot {
  width: 5px; height: 5px; background: var(--gold2);
  border-radius: 50%; flex-shrink: 0;
  animation: pulse 1.4s infinite;
}

/* MAIN */
main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

/* PHASE TABS */
.phase-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.phase-tab {
  padding: 7px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
}
.phase-tab:hover { color: var(--text); }
.phase-tab.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

/* UPDATE BAR */
.update-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 16px; font-size: 12px; color: var(--muted);
  flex-wrap: wrap; gap: 6px;
}
.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--accent); }
.spinning { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SECTION HEADERS (date) */
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; margin-top: 2rem;
}
.section-header:first-child { margin-top: 0; }
.section-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text); white-space: nowrap;
}
.section-line { flex: 1; height: 1px; background: var(--border); }

/* MATCH GRID */
.match-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}

/* MATCH CARD */
.match-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: border-color 0.18s, transform 0.15s;
  position: relative; overflow: hidden;
}
.match-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.match-card.clickable { cursor: pointer; }
.match-card.clickable:hover { border-color: var(--accent); }
a.match-card-link { display: contents; text-decoration: none; color: inherit; }
.match-card.clash { background: var(--clash-bg); border-color: var(--clash-border); }
.match-card.played { opacity: 0.72; }
.match-card.live { border-color: var(--live-green); }
.match-card.live::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--live-green);
}

.card-top {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
}
.card-time { font-weight: 600; color: var(--text); font-size: 12px; white-space: nowrap; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.card-venue {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.card-group-tag {
  font-size: 10px; font-weight: 600; color: var(--muted);
  background: var(--surface2); padding: 1px 6px;
  border-radius: 4px; flex-shrink: 0;
}
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 999px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.status-live { background: rgba(16,185,129,0.18); color: var(--live-green); }
.status-ft   { background: rgba(148,163,184,0.12); color: var(--muted); }
.status-up   { background: rgba(59,130,246,0.10); color: var(--accent2); }
.status-ht   { background: rgba(251,191,36,0.15); color: var(--gold2); }
.status-past { background: rgba(148,163,184,0.06); color: var(--muted); }

/* PAST MATCHES COLLAPSIBLE */
.past-section { margin-top: 2rem; }
.past-summary {
  list-style: none; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 2px; border: none; background: none; width: 100%;
}
.past-summary::-webkit-details-marker { display: none; }
.past-toggle-icon { font-size: 9px; transition: transform 0.2s; flex-shrink: 0; }
details[open] .past-toggle-icon { transform: rotate(90deg); }
.past-count {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 1px 7px; border-radius: 999px;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.past-summary-line { flex: 1; height: 1px; background: var(--border); }
.past-grid-wrapper { padding-top: 4px; }
.live-dot {
  width: 6px; height: 6px; background: var(--live-green);
  border-radius: 50%; animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.score.win { color: #6ee7b7; }
.team-code.winner { color: #6ee7b7; }

/* TEAMS ROW */
.teams-row {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
  /* prevent overflow on narrow screens */
  min-width: 0;
}
.team {
  flex: 1; display: flex; align-items: center; gap: 6px;
  min-width: 0; /* allow shrinking */
  overflow: hidden;
}
.team.away { flex-direction: row-reverse; }
.team-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
.team-info { min-width: 0; flex: 1; overflow: hidden; }
.team.away .team-info { text-align: right; }
.team-code {
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.team-person { font-size: 11px; color: var(--gold); font-weight: 500; white-space: nowrap; }
.score-block {
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0; /* score never shrinks or gets pushed */
  min-width: 48px; justify-content: center;
}
.score {
  font-size: 22px; font-weight: 800; color: var(--text);
  min-width: 18px; text-align: center; font-variant-numeric: tabular-nums;
}
.score.tbd { font-size: 14px; color: var(--muted); font-weight: 400; }
.score-sep { font-size: 16px; color: var(--border2); }
.score.win { color: #6ee7b7; }

/* CLASH FOOTER */
.clash-footer {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid rgba(245,158,11,0.2);
  font-size: 11px; color: var(--gold2); font-weight: 600;
}

/* KNOCKOUT */
.bracket-notice {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 2rem; text-align: center;
  color: var(--muted); font-size: 14px;
}
.bracket-notice strong {
  color: var(--text); display: block;
  font-size: 16px; margin-bottom: 6px;
}

/* EMPTY */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: var(--muted); font-size: 14px;
}
.empty-state .big { font-size: 40px; margin-bottom: 10px; }

/* CONTENT LAYOUT — two-column when a team is selected */
#content-layout { display: flex; gap: 20px; align-items: flex-start; }
#matches-col { flex: 1; min-width: 0; }

/* TEAM PANEL */
#team-panel {
  width: 300px; flex-shrink: 0;
  position: sticky; top: 72px;
  max-height: calc(100vh - 88px);
  overflow-y: auto;
  display: none; /* shown by JS */
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

/* GLOBAL NEWS PANEL */
#global-news-panel {
  width: 300px; flex-shrink: 0;
  position: sticky; top: 72px;
  max-height: calc(100vh - 88px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.gnews-header {
  font-size: 12px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text);
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
body.arsenal-mode  #global-news-panel .gnews-header { color: #C6A84B; border-color: rgba(2,52,116,0.25); }
body.spurs-mode    #global-news-panel .gnews-header { color: #ADD8E6; border-color: rgba(19,34,87,0.25); }
body.chelsea-mode  #global-news-panel .gnews-header { color: #C8A84B; border-color: rgba(3,70,148,0.25); }
.tpanel-header {
  background: linear-gradient(135deg, #0d1b3e, #1a0a2e);
  border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 16px; display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.tpanel-flag { font-size: 36px; line-height: 1; flex-shrink: 0; }
.tpanel-name { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.tpanel-picker { font-size: 12px; color: var(--gold); font-weight: 600; margin-top: 2px; }
.tpanel-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
}
.tpanel-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}

/* PLAYERS */
.players-grid { display: flex; flex-direction: column; gap: 8px; }
.player-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 7px 10px;
  background: var(--surface2); border-radius: var(--radius-sm);
}
.player-name { font-size: 13px; font-weight: 600; color: var(--text); }
.player-meta { font-size: 11px; color: var(--muted); text-align: right; }
.player-pos {
  font-size: 10px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; background: rgba(59,130,246,0.15);
  color: var(--accent2); flex-shrink: 0;
}

/* NEWS */
.news-list { display: flex; flex-direction: column; gap: 10px; }
.news-item {
  display: flex; gap: 10px; text-decoration: none; color: inherit;
  padding: 8px; border-radius: var(--radius-sm);
  background: var(--surface2); transition: background 0.15s;
}
.news-item:hover { background: rgba(59,130,246,0.1); }
.news-thumb {
  width: 64px; height: 48px; object-fit: cover;
  border-radius: 6px; flex-shrink: 0; background: var(--surface2);
}
.news-thumb-placeholder {
  width: 64px; height: 48px; flex-shrink: 0; border-radius: 6px;
  background: var(--surface2); display: flex; align-items: center;
  justify-content: center; font-size: 20px;
}
.news-content { min-width: 0; }
.news-headline {
  font-size: 12px; font-weight: 600; color: var(--text);
  line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.news-age { font-size: 11px; color: var(--muted); margin-top: 3px; }
.news-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.news-source {
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--muted); opacity: 0.7;
}
.news-loading { font-size: 12px; color: var(--muted); text-align: center; padding: 16px 0; }
.news-empty  { font-size: 12px; color: var(--muted); text-align: center; padding: 16px 0; }

@media(max-width: 900px) {
  #content-layout { flex-direction: column; }
  #team-panel { width: 100%; position: static; max-height: none; display: none; }
  #global-news-panel { display: none; }
}

/* FOOTER */
footer {
  text-align: center; padding: 2rem 1rem;
  font-size: 12px; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 3rem;
}

/* LOADING OVERLAY */
#loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 12px;
  font-size: 14px; color: var(--muted);
}
#loading-overlay .spin-big {
  font-size: 32px; animation: spin 1s linear infinite; display: inline-block;
}

@media(max-width:600px){
  .match-grid { grid-template-columns: 1fr; }
  .hero-title { font-size: 22px; }
  .team-code { font-size: 13px; }
  .score { font-size: 20px; }
  .phase-tabs { gap: 4px; }
  .phase-tab { padding: 6px 11px; font-size: 12px; }
}

/* ── CHELSEA MODE ─────────────────────────────────────── */

body.chelsea-mode {
  --bg:           #034694;
  --surface:      #ffffff;
  --surface2:     #eef3ff;
  --border:       rgba(3,70,148,0.18);
  --border2:      rgba(3,70,148,0.35);
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.65);
  --accent:       #C8A84B;
  --accent2:      #d9bc6a;
  --gold:         #C8A84B;
  --gold2:        #d9bc6a;
  --clash-bg:     rgba(200,168,75,0.12);
  --clash-border: rgba(200,168,75,0.5);
}
body.chelsea-mode header {
  background: linear-gradient(135deg, #022f6b 0%, #011e44 50%, #022f6b 100%);
  border-bottom-color: rgba(200,168,75,0.35);
}
body.chelsea-mode .hero {
  background: linear-gradient(135deg, #022f6b 0%, #011e44 100%);
  border-bottom-color: rgba(200,168,75,0.2);
}
body.chelsea-mode .hero-eyebrow { color: #C8A84B; }
body.chelsea-mode .phase-tab {
  background: rgba(255,255,255,0.88);
  border-color: rgba(3,70,148,0.2);
  color: #034694;
}
body.chelsea-mode .phase-tab.active {
  background: #ffffff;
  border-color: #C8A84B;
  color: #034694;
}
body.chelsea-mode .phase-tab:hover { background: rgba(255,255,255,1); color: #034694; }
body.chelsea-mode .match-card {
  background: #ffffff;
  border-color: rgba(3,70,148,0.15);
}
body.chelsea-mode .match-card:hover { border-color: #034694; }
body.chelsea-mode .match-card.clickable:hover { border-color: #034694; }
body.chelsea-mode .card-time   { color: #034694; }
body.chelsea-mode .card-venue  { color: rgba(3,70,148,0.65); }
body.chelsea-mode .team-code   { color: #034694; }
body.chelsea-mode .score       { color: #034694; }

  .phase-tabs {

// Convert "HH:MM" 24h → "H:MMam/pm" ET
function to12h(t) {
  if (!t || t === 'TBD') return t;
  if (t.includes('m')) return t; // already has am/pm
  const [hStr, mStr] = t.split(':');
  let h = parseInt(hStr, 10);
  const m = mStr;
  const ampm = h >= 12 ? 'pm' : 'am';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${h}:${m}${ampm}`;
}

// Derive the correct day-of-week label from the ISO date — avoids the
// off-by-one error that was baked into the original schedule strings.
function formatSectionDate(dateStr) {
  const iso = DATE_ISO[dateStr];
  if (!iso) return dateStr; // fallback to raw string
  const [y, mo, d] = iso.split('-').map(Number);
  const dt = new Date(y, mo - 1, d); // local midnight — no timezone shift
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAYS[dt.getDay()]} ${MONS[dt.getMonth()]} ${dt.getDate()}`;
}

// Current time expressed as "YYYY-MM-DDTHH:MM" in ET (EDT = UTC-4).
// FWC 2026 runs Jun–Jul so EDT applies for the full tournament.
function getETNowKey() {
  return new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString().slice(0, 16);
}

// True when a match is definitively over OR its kickoff was 3+ hours ago
// (heuristic for when the ESPN API has stopped returning it).
function isMatchPast(m) {
  const s = scores[m.id];
  if (s?.status === 'ft')   return true;
  if (s?.status === 'live' || s?.status === 'ht') return false;
  // Time-based: treat the sort-key value as "fake UTC" so arithmetic works
  // (matchSortKey and getETNowKey both subtract 4 h, so differences cancel).
  const kickoffMs = new Date(matchSortKey(m) + ':00Z').getTime();
  const nowMs     = new Date(getETNowKey()    + ':00Z').getTime();
  return (nowMs - kickoffMs) >= 3 * 60 * 60 * 1000; // 3 h after kickoff
}

// Returns sortable string "YYYY-MM-DDTHH:MM"
function matchSortKey(m) {
  const iso = DATE_ISO[m.date] || '2026-99-99';
  // knockout matches have "3:00pm" style times — convert to 24h for sorting
  let t = m.time || '00:00';
  if (t.includes('m')) {
    const pm = t.endsWith('pm');
    t = t.replace(/am|pm/, '');
    let [h, min] = t.split(':').map(Number);
    if (pm && h !== 12) h += 12;
    if (!pm && h === 12) h = 0;
    t = String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0');
  }
  return iso + 'T' + t;
}

async function loadMatchData() {
  const res = await fetch('matches.json');
  if (!res.ok) throw new Error('Failed to load matches.json');
  const data = await res.json();
  GROUP_MATCHES = data.group;
  KNOCKOUT_MATCHES = data.knockout;
  GROUP_MATCHES.sort((a, b) => matchSortKey(a).localeCompare(matchSortKey(b)));
}

async function loadScoreOverrides() {
  try {
    const res = await fetch('scores.json');
    if (!res.ok) return;
    const data = await res.json();
    if (data.overrides) {
      Object.entries(data.overrides).forEach(([idStr, s]) => {
        scores[parseInt(idStr, 10)] = s;
      });
    }
  } catch(e) {
    // scores.json is optional
  }
}

// Persist scores to localStorage so yesterday's FT results survive page
// reloads even after ESPN drops them from the scoreboard feed.
function saveScores() {
  try { localStorage.setItem('fwc26_scores', JSON.stringify(scores)); } catch(e) {}
}

// Merge cached scores in as a baseline. Fresh API data and manual overrides
// always win (they are applied after this call).
function loadCachedScores() {
  try {
    const cached = JSON.parse(localStorage.getItem('fwc26_scores') || '{}');
    Object.entries(cached).forEach(([id, s]) => {
      const numId = parseInt(id, 10);
      if (!scores[numId]) scores[numId] = s; // don't overwrite fresher data
    });
  } catch(e) {}
}

// Lazily populated: our 3-letter code → ESPN numeric team ID
const _espnTeamIdCache = {};
let _espnTeamIdFetchDone = false;

async function resolveESPNTeamId(code) {
  if (_espnTeamIdCache[code]) return _espnTeamIdCache[code];
  if (!_espnTeamIdFetchDone) {
    try {
      const r = await fetch(
        'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/teams?limit=200',
        { signal: AbortSignal.timeout(6000) }
      );
      if (r.ok) {
        const d = await r.json();
        const teams = d.sports?.[0]?.leagues?.[0]?.teams || [];
        teams.forEach(t => {
          const abbr = t.team?.abbreviation?.toUpperCase();
          const id   = t.team?.id;
          if (abbr && id) _espnTeamIdCache[abbr] = id;
        });
      }
    } catch(e) {}
    _espnTeamIdFetchDone = true;
  }
  return _espnTeamIdCache[code] || null;
}

function timeAgo(isoString) {
  const diff = (Date.now() - new Date(isoString)) / 1000;
  if (diff < 3600)  return Math.floor(diff / 60)  + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ── Per-source fetchers — each returns normalised { headline, url, thumb, published, source } ──

async function fetchESPNNews(code) {
  const espnId = await resolveESPNTeamId(code);
  const out = [];

  if (espnId) {
    try {
      const r = await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/teams/${espnId}/news?limit=6`,
        { signal: AbortSignal.timeout(7000) }
      );
      if (r.ok) {
        const d = await r.json();
        (d.articles || []).forEach(a => {
          if (!a.headline) return;
          out.push({ headline: a.headline, url: a.links?.web?.href || '#',
            thumb: a.images?.[0]?.url || null, published: a.published || null, source: 'espn' });
        });
      }
    } catch(e) {}
  }

  // Fallback: filter general WC feed by team name
  if (out.length === 0) {
    try {
      const teamName = (TEAM_FULL_NAME[code] || FAMILY[code]?.name || code).toLowerCase();
      const r = await fetch(
        'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news?limit=40',
        { signal: AbortSignal.timeout(7000) }
      );
      if (r.ok) {
        const d = await r.json();
        (d.articles || [])
          .filter(a => (a.headline + ' ' + (a.description || '')).toLowerCase().includes(teamName))
          .slice(0, 6)
          .forEach(a => {
            if (!a.headline) return;
            out.push({ headline: a.headline, url: a.links?.web?.href || '#',
              thumb: a.images?.[0]?.url || null, published: a.published || null, source: 'espn' });
          });
      }
    } catch(e) {}
  }

  return out;
}

// ── Shared general WC feed cache (ESPN + Guardian, no team filter) ──
// Fetched once; reused by global sidebar AND team panel filtering.
let _wcFeedCache = null;
let _wcFeedPromise = null;

async function getWCFeed() {
  if (_wcFeedCache) return _wcFeedCache;
  if (_wcFeedPromise) return _wcFeedPromise; // deduplicate concurrent calls
  _wcFeedPromise = (async () => {
    const [espnRes, guardianRes] = await Promise.allSettled([
      (async () => {
        const r = await fetch(
          'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news?limit=40',
          { signal: AbortSignal.timeout(7000) }
        );
        if (!r.ok) return [];
        const d = await r.json();
        return (d.articles || []).map(a => ({
          headline: a.headline, url: a.links?.web?.href || '#',
          thumb: a.images?.[0]?.url || null, published: a.published || null, source: 'espn',
        }));
      })(),
      fetchGuardianWCNews(),
    ]);
    _wcFeedCache = [
      ...(espnRes.status     === 'fulfilled' ? espnRes.value     : []),
      ...(guardianRes.status === 'fulfilled' ? guardianRes.value : []),
    ];
    return _wcFeedCache;
  })();
  return _wcFeedPromise;
}

function renderNewsArticle(a) {

function mergeAndRender(arrays, cap = 10) {
  const seen = new Set();
  return arrays.flat()
    .sort((a, b) => (b.published || '').localeCompare(a.published || ''))
    .filter(a => {
      const key = a.headline.toLowerCase().slice(0, 40);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .slice(0, cap);
}

async function fetchTeamNews(code) {
  const panel  = document.getElementById('team-panel');
  const newsEl = panel?.querySelector('.tpanel-news-body');
  if (!newsEl) return;

  newsEl.innerHTML = '<div class="news-loading">Loading news…</div>';

  const teamName = (TEAM_FULL_NAME[code] || FAMILY[code]?.name || code).toLowerCase();

  // Three sources in parallel:
  // 1) ESPN team-specific endpoint
  // 2) Guardian team-specific query (headline must include team name)
  // 3) General WC feed (cached) filtered to articles that name the team in headline
  const [espnRes, guardianRes, wcFeedRes] = await Promise.allSettled([
    fetchESPNNews(code),
    fetchGuardianNews(code),
    getWCFeed(),
  ]);

  const fromFeed = wcFeedRes.status === 'fulfilled'
    ? wcFeedRes.value.filter(a => a.headline.toLowerCase().includes(teamName))
    : [];

  const deduped = mergeAndRender([
    espnRes.status     === 'fulfilled' ? espnRes.value     : [],
    guardianRes.status === 'fulfilled' ? guardianRes.value : [],
    fromFeed,
  ]);

  if (deduped.length === 0) {
    newsEl.innerHTML = '<div class="news-empty">No recent news found.</div>';

  newsEl.innerHTML = `<div class="news-list">${deduped.map(renderNewsArticle).join('')}</div>`;

// SCORE FETCHING

async function fetchScores() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  document.getElementById('last-updated').textContent = 'Fetching latest scores…';

  // Start with manual overrides (they take priority over API)
  const overrides = {};
  try {
    const res = await fetch('scores.json');
    if (res.ok) {
      const data = await res.json();
      if (data.overrides) Object.assign(overrides, data.overrides);
    }
  } catch(e) {}

  try {
    // Fetch today AND yesterday in ET so matches that finished late yesterday
    // remain marked FT after midnight. ESPN uses ?dates=YYYYMMDD.
    const fmtDate = d => new Date(d - 4 * 60 * 60 * 1000).toISOString().slice(0,10).replace(/-/g,'');
    const todayStr = fmtDate(Date.now());
    const yesterdayStr = fmtDate(Date.now() - 86400000);

    const scoreboardUrls = [
      `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${todayStr}`,
      `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${yesterdayStr}`,
      'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard', // undated fallback
    ];

    const allEvents = [];
    const seenIds = new Set();
    for (const url of scoreboardUrls) {
      try {
        const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
        if (r.ok) {
          const d = await r.json();
          (d.events || []).forEach(ev => {
            if (ev.id && !seenIds.has(ev.id)) { seenIds.add(ev.id); allEvents.push(ev); }
          });
        }
      } catch(e) {}
    }
    if (allEvents.length > 0) parseESPN(allEvents);
  } catch(e) {
    document.getElementById('last-updated').textContent = 'Could not fetch scores — showing scheduled times';
  }

  // Apply manual overrides on top of API results
  Object.entries(overrides).forEach(([idStr, s]) => {
    scores[parseInt(idStr, 10)] = s;
  });

  saveScores(); // persist so yesterday's FT results survive a page reload

  document.getElementById('last-updated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  icon.classList.remove('spinning');
  render();
  schedulePoll(); // re-schedule after every fetch so interval adapts
}

// Poll every 30 s when any match is live/at half-time; otherwise every 2 minutes.
let _pollTimer = null;
function schedulePoll() {
  if (_pollTimer) clearInterval(_pollTimer);
  const hasLive = Object.values(scores).some(s => s.status === 'live' || s.status === 'ht');
  _pollTimer = setInterval(fetchScores, hasLive ? 30_000 : 120_000);
}

function parseESPN(events) {
  const allMatches = [...GROUP_MATCHES, ...Object.values(KNOCKOUT_MATCHES).flat()];
  events.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;

    // Use state + completed for reliable status — much more robust than matching
    // individual status name strings (ESPN has ~15 different status names).
    const statusType  = ev.status?.type || {};
    const state       = statusType.state;       // "pre" | "in" | "post"
    const completed   = statusType.completed;   // true when the match is over
    const statusName  = statusType.name || '';
    const displayClock = ev.status?.displayClock || ''; // "45:00", "0:00" at HT/FT
    const shortDetail  = statusType.shortDetail  || ''; // "HT", "90'+2", "FT", "23:00 - 1st"

    const competitors = comp.competitors || [];
    if (competitors.length < 2) return;
    const homeComp = competitors.find(c => c.homeAway === 'home');
    const awayComp = competitors.find(c => c.homeAway === 'away');
    if (!homeComp || !awayComp) return;

    const hCode  = homeComp.team?.abbreviation?.toUpperCase();
    const aCode  = awayComp.team?.abbreviation?.toUpperCase();
    const hScore = parseInt(homeComp.score) || 0;
    const aScore = parseInt(awayComp.score) || 0;

    const match = allMatches.find(m =>
      (m.home === hCode && m.away === aCode) || (m.home === aCode && m.away === hCode)
    );
    if (!match) return;
    const flipped = match.away === hCode;

    // Map to our three-state model
    let status;
    if (state === 'post' || completed === true) {
      status = 'ft';
    } else if (state === 'in') {
      status = statusName === 'STATUS_HALFTIME' ? 'ht' : 'live';
    } else {
      status = 'sched';
    }

    // Build a human-readable clock string for live/ht
    let clock = '';
    if (status === 'live') {
      if (shortDetail) {
        // shortDetail looks like "45:00 - 1st Half" — grab just the minutes part
        const minutePart = shortDetail.split(' - ')[0].trim();
        // Convert "45:00" → "45'" or keep stoppage-time strings like "90'+3"
        const colonIdx = minutePart.indexOf(':');
        if (colonIdx !== -1) {
          clock = parseInt(minutePart.slice(0, colonIdx), 10) + "'";
        } else {
          clock = minutePart; // already a nice string like "90'+2"
        }
      } else if (displayClock && displayClock !== '0:00') {
        clock = parseInt(displayClock.split(':')[0], 10) + "'";
      }
    } else if (status === 'ht') {
      clock = 'HT';
    }

    // Convert ESPN's UTC kickoff date → ET 12-hour time string (e.g. "1:00pm")
    // FWC 2026 runs entirely during EDT (UTC-4), so a fixed -4 h offset is correct.
    let espnTime = null;
    if (ev.date) {
      const d = new Date(ev.date);
      let h = d.getUTCHours() - 4; // UTC → EDT
      if (h < 0) h += 24;
      const mm   = String(d.getUTCMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'pm' : 'am';
      const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
      espnTime = `${h12}:${mm}${ampm}`;
    }

    scores[match.id] = {
      home:    flipped ? aScore : hScore,
      away:    flipped ? hScore : aScore,
      homeWin: flipped ? awayComp.winner : homeComp.winner,
      awayWin: flipped ? homeComp.winner : awayComp.winner,
      status,
      clock,
      espnId:  ev.id,
      espnTime,            // authoritative kickoff time straight from ESPN
    };
  });
}

function isFamilyTeam(code) { return !!FAMILY[code]; }
function isKnockoutPlaceholder(code) { return /^[W12L3]/.test(code); }

function matchPassesFilter(m) {
  if (arsenalMode)  return !!ARSENAL_MATCHES[m.id];
  if (spursMode)    return !!SPURS_MATCHES[m.id];
  if (chelseaMode)  return !!CHELSEA_MATCHES[m.id];
  if (selectedTeam) return m.home === selectedTeam || m.away === selectedTeam;
  if (viewMode === 'family') return isFamilyTeam(m.home) || isFamilyTeam(m.away);
  return true;
}

function isClash(m) { return isFamilyTeam(m.home) && isFamilyTeam(m.away); }

// Find next unplayed match for a given team code across all matches
function nextMatchForTeam(code) {
  const nowKey = new Date().toISOString().slice(0,16).replace('T','T'); // "YYYY-MM-DDTHH:MM" UTC
  // Use local ET offset approximation (UTC-4 EDT / UTC-5 EST)
  // We compare sort keys (ET times from schedule) against current local time
  const now = new Date();
  const etOffset = -4; // EDT; adjust to -5 in Nov–Mar if needed
  const etNow = new Date(now.getTime() + (now.getTimezoneOffset() + etOffset * 60) * 60000);
  const etNowKey = etNow.toISOString().slice(0,16);

  const allMatches = [...GROUP_MATCHES, ...Object.values(KNOCKOUT_MATCHES).flat()];
  const upcoming = allMatches
    .filter(m => {
      if (m.home !== code && m.away !== code) return false;
      const s = scores[m.id];
      if (s && s.status === 'ft') return false; // already played
      return matchSortKey(m) >= etNowKey;
    })
    .sort((a, b) => matchSortKey(a).localeCompare(matchSortKey(b)));

  return upcoming[0] || null;
}

function formatNextMatch(m) {
  if (!m) return null;
  const opponent = (m.home === arguments[0] ? m.away : m.home); // won't work — see usage below
  const shortDate = m.date.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun) /, '');
  return `${shortDate} · ${to12h(m.time)}`;
}

// MATCH CARD RENDERING

function deriveMatchState(m) {
  const s = scores[m.id];
  return {
    score:       s || null,
    played:      isMatchPast(m),   // robust: FT flag OR 3h heuristic
    live:        s?.status === 'live' || s?.status === 'ht',
    clash:       isClash(m),
    displayTime: s?.espnTime || to12h(m.time),
  };
}

function renderScoreBlock(matchId) {
  const s = scores[matchId];
  if (!s || s.status === 'sched') {
    return `<div class="score-block"><span class="score tbd">·:·</span></div>`;
  }
  // Use ESPN's winner flags when available; fall back to score comparison
  const hWin = s.homeWin ?? (s.home > s.away);
  const aWin = s.awayWin ?? (s.away > s.home);
  return `<div class="score-block">
    <span class="score${hWin ? ' win' : ''}">${s.home}</span>
    <span class="score-sep">:</span>
    <span class="score${aWin ? ' win' : ''}">${s.away}</span>
  </div>`;
}

function renderStatusBadge(m) {
  const s = scores[m.id];
  if (s?.status === 'ht')   return `<span class="status-badge status-ht">Half Time</span>`;
  if (s?.status === 'live') {
    const label = s.clock || 'Live';
    return `<span class="status-badge status-live"><span class="live-dot"></span>${label}</span>`;
  }
  if (s?.status === 'ft')   return `<span class="status-badge status-ft">FT</span>`;
  // No API data — use time heuristic
  if (isMatchPast(m))       return `<span class="status-badge status-past">Past</span>`;
  return `<span class="status-badge status-up">Upcoming</span>`;
}

function renderTeamBlock(code, side, isWinner) {
  const f = FAMILY[code];
  const fl = getFlag(code);
  const displayName = f ? f.name : code;
  const person = f ? `<div class="team-person">${f.person}</div>` : '';
  const winClass = isWinner ? ' winner' : '';
  return `<div class="team ${side}">
    <span class="team-flag">${fl}</span>
    <div class="team-info">
      <div class="team-code${winClass}">${displayName}</div>
      ${person}
    </div>
  </div>`;
}

        </div>`;

      ${renderTeamBlock(m.away, 'away', played && awayWin)}
    </div>
    ${clashFooter}${arsenalFooter}${spursFooter}${chelseaFooter}
  </div>`;

  // Wrap finished cards in a link; upcoming/live cards are plain divs
  return espnUrl
    ? `<a class="match-card-link" href="${espnUrl}" target="_blank" rel="noopener noreferrer">${cardInner}</a>`
    : cardInner;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function render() {
  if (activePhase === 'group') {
    renderGroupStage();
  } else {
    renderKnockout();
  }
}

function groupByDate(matches) {
  const byDate = {};
  matches.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });
  return byDate;
}

function renderDateGroups(byDate, firstNoTopMargin = true) {
  return Object.entries(byDate).map(([date, group], i) => `
    <div class="section-header${firstNoTopMargin && i === 0 ? ' style="margin-top:0"' : ''}">
      <span class="section-label">${formatSectionDate(date)}</span>
      <div class="section-line"></div>
    </div>
    <div class="match-grid">${group.map(renderMatchCard).join('')}</div>
  `).join('');
}

// ET today as YYYY-MM-DD (EDT = UTC-4, constant during the tournament)
function getETToday() {
  return new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString().slice(0, 10);
}

function renderDateSections(matches) {
  const past   = matches.filter(m =>  isMatchPast(m));
  const active = matches.filter(m => !isMatchPast(m));

  let html = '';

  // ── Previous matches collapsible — shown FIRST so it's always easy to find ──
  if (past.length > 0) {
    const byDate  = groupByDate(past);
    const reversed = Object.fromEntries(Object.entries(byDate).reverse());
    html += `
      <details class="past-section" style="margin-top:0">
        <summary class="past-summary">
          <span class="past-toggle-icon">▶</span>
          Previous Matches
          <span class="past-count">${past.length}</span>
          <span class="past-summary-line"></span>
        </summary>
        <div class="past-grid-wrapper">
          ${renderDateGroups(reversed, false)}
        </div>
      </details>`;
  }

  // ── Upcoming / live matches — split into today vs future for mobile ──
  if (active.length > 0) {
    const today   = getETToday();
    const todayMs = active.filter(m => (DATE_ISO[m.date] || '') === today);
    const futureMs = active.filter(m => (DATE_ISO[m.date] || '') > today);
    // Also catches matches with unknown/TBD dates that aren't today
    const otherMs  = active.filter(m => !(DATE_ISO[m.date]) ||
      ((DATE_ISO[m.date] !== today) && (DATE_ISO[m.date] <= today)));

    const firstSection = past.length === 0;

    const isMobile = window.innerWidth <= 768;

    // Today's matches (always visible on desktop and mobile)
    if (todayMs.length > 0) {
      html += renderDateGroups(groupByDate(todayMs), firstSection);
    } else if (isMobile && futureMs.length > 0) {
      // No matches today — show a lightweight note on mobile only
      html += `<div class="mobile-no-today">No matches today</div>`;
    }

    if (futureMs.length > 0) {
      if (isMobile) {
        // Mobile: collapsible <details> — same style as "Previous Matches"
        html += `
          <details class="past-section upcoming-details">
            <summary class="past-summary">
              <span class="past-toggle-icon">▶</span>
              Upcoming Matches
              <span class="past-count">${futureMs.length}</span>
              <span class="past-summary-line"></span>
            </summary>
            <div class="past-grid-wrapper">
              ${renderDateGroups(groupByDate(futureMs), false)}
            </div>
          </details>`;
      } else {
        // Desktop: show future matches inline as normal
        html += renderDateGroups(groupByDate(futureMs), firstSection && todayMs.length === 0);
      }
    }
  }

  return html;
}

function renderGroupStage() {
  document.getElementById('group-view').style.display = '';
  document.getElementById('knockout-view').style.display = 'none';

  const filtered = GROUP_MATCHES.filter(matchPassesFilter);
  let html;
  if (filtered.length === 0) {
    const label = selectedTeam
      ? `No group stage matches found for ${FAMILY[selectedTeam]?.name || selectedTeam}.`
      : `No family matches in the group stage — try "All matches".`;
    html = `<div class="empty-state"><div class="big">⚽</div><p>${label}</p></div>`;
  } else {
    html = renderDateSections(filtered);
  }
  document.getElementById('group-view').innerHTML = html;
}

function renderKnockout() {
  document.getElementById('group-view').style.display = 'none';
  document.getElementById('knockout-view').style.display = '';

  const phaseMatches = KNOCKOUT_MATCHES[activePhase] || [];
  const phaseName = {
    r32:'Round of 32', r16:'Round of 16',
    qf:'Quarter-Finals', sf:'Semi-Finals', final:'Final & Bronze',
  }[activePhase];

  const anyResolved = phaseMatches.some(
    m => !isKnockoutPlaceholder(m.home) || !isKnockoutPlaceholder(m.away)
  );

  let html;
  if (!anyResolved) {
    html = `<div class="bracket-notice">
      <strong>🔒 ${phaseName} — bracket pending</strong>
      Teams will be confirmed once prior rounds conclude. Check back soon.
    </div>`;
  } else {
    const filtered = phaseMatches.filter(matchPassesFilter);
    if (filtered.length === 0) {
      html = `<div class="empty-state"><div class="big">🔍</div>
        <p>No matches found for your current filter. Try "All matches" to see the full bracket.</p>
      </div>`;
    } else {
      html = renderDateSections(filtered);
    }
  }
  document.getElementById('knockout-view').innerHTML = html;
}

function buildPillHTML(code, f) {
  const sel = selectedTeam === code ? ' selected' : '';
  const next = nextMatchForTeam(code);
  let nextHtml = '';
  if (next) {
    const shortDate = formatSectionDate(next.date).slice(4);
    nextHtml = `<div class="pill-next">
      <span class="pill-next-dot"></span>${shortDate} · ${to12h(next.time)}
    </div>`;
  }
  return `<div class="team-pill${sel}" onclick="toggleTeam('${code}')">
    <div class="pill-main">
      <span class="pill-flag">${f.flag}</span>
      <span>${f.name}</span>
      <span class="pill-person">${f.person}</span>
    </div>
    ${nextHtml}
  </div>`;
}

function renderTeamPills() {
  const el = document.getElementById('team-pills');
  const once = Object.entries(FAMILY).map(([code, f]) => buildPillHTML(code, f)).join('');
  // Duplicate for seamless auto-scroll loop
  el.innerHTML = once + once;
  // Reset scroll so animation restarts cleanly
  const wrap = el.closest('.team-filter-wrap');
  if (wrap) wrap.scrollLeft = 0;
  pillScrollPos = 0;
  syncMobileSelect();
}

// ── MOBILE TEAM SELECT ───────────────────────────────────────

function initMobileTeamSelect() {
  const sel = document.getElementById('team-select-mobile');
  if (!sel) return;
  // Populate options
  const opts = Object.entries(FAMILY).map(([code, f]) =>
    `<option value="${code}">${f.flag} ${f.name} · ${f.person}</option>`
  ).join('');
  sel.innerHTML = `<option value="">🌍 All teams</option>${opts}`;
  syncMobileSelect();
}

function syncMobileSelect() {
  const sel = document.getElementById('team-select-mobile');
  if (!sel) return;
  sel.value = selectedTeam || '';
}

function mobileSelectTeam(code) {
  selectedTeam = code || null;
  document.getElementById('btn-all').classList.toggle('active', !selectedTeam && viewMode === 'all');
  document.getElementById('btn-family').classList.toggle('active', !selectedTeam && viewMode === 'family');
  saveState();
  renderHero(selectedTeam);
  renderTeamPills(); // also calls syncMobileSelect
  renderTeamPanel(selectedTeam);
  render();
}

function toggleMobileNews(toggleEl) {
  // Only toggle on mobile; on desktop the wrap has no max-height constraint
  if (window.innerWidth > 768) return;
  const wrap = toggleEl.closest('.tpanel-section').querySelector('.tpanel-news-body-wrap');
  if (!wrap) return;
  const isOpen = wrap.classList.toggle('open');
  toggleEl.classList.toggle('open', isOpen);
  toggleEl.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

// ═══════════════════════════════════════════════════════
// PILL AUTO-SCROLL
// ═══════════════════════════════════════════════════════

let pillScrollPos = 0;
let pillScrollRAF = null;
let pillScrollPaused = false;

function startPillScroll() {
  const wrap = document.querySelector('.team-filter-wrap');
  if (!wrap) return;

  // Pause on hover/touch; resume on leave
  wrap.addEventListener('mouseenter',  () => { pillScrollPaused = true; });
  wrap.addEventListener('mouseleave',  () => { pillScrollPaused = false; });
  wrap.addEventListener('touchstart',  () => { pillScrollPaused = true; }, { passive: true });
  wrap.addEventListener('touchend',    () => { setTimeout(() => { pillScrollPaused = false; }, 800); }, { passive: true });

  // Drag-to-scroll — only activate after 6px movement so clicks still fire
  let isDragging = false, didDrag = false, dragStartX = 0, dragStartScroll = 0;
  wrap.addEventListener('pointerdown', e => {
    isDragging = true;
    didDrag = false;
    dragStartX = e.clientX;
    dragStartScroll = wrap.scrollLeft;
    pillScrollPaused = true;
  });
  wrap.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    if (!didDrag && Math.abs(dx) < 6) return; // threshold before drag begins
    if (!didDrag) { didDrag = true; wrap.setPointerCapture(e.pointerId); }
    wrap.scrollLeft = dragStartScroll - dx;
    pillScrollPos = wrap.scrollLeft;
  });
  wrap.addEventListener('pointerup', () => {
    isDragging = false;
    setTimeout(() => { pillScrollPaused = false; }, 600);
  });
  // Swallow the click that follows a drag so pills don't toggle accidentally
  wrap.addEventListener('click', e => {
    if (didDrag) { e.stopPropagation(); didDrag = false; }
  }, true);

  // rAF auto-scroll loop — also frozen while a team is selected
  cancelAnimationFrame(pillScrollRAF);
  function step() {
    if (!pillScrollPaused && !isDragging && !selectedTeam) {
      const track = document.getElementById('team-pills');
      if (track) {
        const halfWidth = track.scrollWidth / 2;
        pillScrollPos += 0.45;
        if (halfWidth > 0 && pillScrollPos >= halfWidth) pillScrollPos = 0;
        wrap.scrollLeft = pillScrollPos;
      }
    }
    pillScrollRAF = requestAnimationFrame(step);
  }
  pillScrollRAF = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════
// CLUB MODE CONTROLS
// ═══════════════════════════════════════════════════════

function updateClubBtn() {
  const btn = document.getElementById('btn-club');
  if (!btn) return;
  const optArsenal = document.getElementById('club-opt-arsenal');
  const optSpurs   = document.getElementById('club-opt-spurs');
  const optChelsea = document.getElementById('club-opt-chelsea');
  optArsenal?.classList.toggle('active', arsenalMode);
  optSpurs?.classList.toggle('active', spursMode);
  optChelsea?.classList.toggle('active', chelseaMode);
  if (arsenalMode) {
    btn.textContent = '🏆 Arsenal Mode';
    btn.className = 'club-btn arsenal-active';
  } else if (spursMode) {
    btn.textContent = '💩 Spurs Mode';
    btn.className = 'club-btn spurs-active';
  } else if (chelseaMode) {
    btn.textContent = '⚽ Chelsea Mode';
    btn.className = 'club-btn chelsea-active';
  } else {
    btn.textContent = '🎽 Club Mode';
    btn.className = 'club-btn';
  }
}

function toggleClubDropdown() {
  const dd = document.getElementById('club-dropdown');
  const isOpen = dd.classList.toggle('open');
  if (isOpen) {
    setTimeout(() => document.addEventListener('click', closeClubDropdown), 0);
  } else {
    document.removeEventListener('click', closeClubDropdown);
  }
}

function closeClubDropdown(e) {
  const wrap = document.getElementById('club-mode-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('club-dropdown').classList.remove('open');
    document.removeEventListener('click', closeClubDropdown);
  }
}

function selectClub(club) {
  document.getElementById('club-dropdown').classList.remove('open');
  document.removeEventListener('click', closeClubDropdown);
  if (club === 'arsenal') toggleArsenalMode();
  else if (club === 'spurs')   toggleSpursMode();
  else if (club === 'chelsea') toggleChelseaMode();
}

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════

function toggleArsenalMode() {
  arsenalMode = !arsenalMode;
  if (arsenalMode) {
    spursMode = false; chelseaMode = false;
    document.body.classList.remove('spurs-mode', 'chelsea-mode');
    selectedTeam = null; renderTeamPanel(null); renderTeamPills();
  }
  document.body.classList.toggle('arsenal-mode', arsenalMode);
  updateClubBtn();
  saveState();
  render();
}

function toggleSpursMode() {
  spursMode = !spursMode;
  if (spursMode) {
    arsenalMode = false; chelseaMode = false;
    document.body.classList.remove('arsenal-mode', 'chelsea-mode');
    selectedTeam = null; renderTeamPanel(null); renderTeamPills();
  }
  document.body.classList.toggle('spurs-mode', spursMode);
  updateClubBtn();
  saveState();
  render();
}

function toggleChelseaMode() {
  chelseaMode = !chelseaMode;
  if (chelseaMode) {
    arsenalMode = false; spursMode = false;
    document.body.classList.remove('arsenal-mode', 'spurs-mode');
    selectedTeam = null; renderTeamPanel(null); renderTeamPills();
  }
  document.body.classList.toggle('chelsea-mode', chelseaMode);
  updateClubBtn();
  saveState();
  render();
}

function setViewMode(v) {
  viewMode = v;
  selectedTeam = null;
  document.getElementById('btn-all').classList.toggle('active', v === 'all');
  document.getElementById('btn-family').classList.toggle('active', v === 'family');
  saveState();
  renderTeamPills();
  render();
}

function setPhase(p) {
  activePhase = p;
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + p)?.classList.add('active');
  saveState();
  render();
}

// ── Hero rendering — tints existing text/bg, keeps layout identical ─

function renderHero(code) {
  const hero     = document.querySelector('.hero');
  const titleEl  = document.getElementById('hero-title');
  const eyebrow  = document.getElementById('hero-eyebrow');

  if (!code || !FAMILY[code]) {
    hero.style.background        = '';
    hero.style.borderBottomColor = '';
    if (titleEl)  titleEl.style.color  = '';
    if (eyebrow)  eyebrow.style.color  = '';
    return;
  }

  const c = TEAM_COLORS[code] || { bg1:'#0d1b3e', bg2:'#1a0a2e', name:'#fff', picker:'#f59e0b' };
  hero.style.background        = `linear-gradient(135deg, ${c.bg1} 0%, ${c.bg2} 100%)`;
  hero.style.borderBottomColor = 'rgba(255,255,255,0.15)';
  // "FIFA WORLD CUP 2026" → secondary colour; "Family Schedule" → tertiary
  if (titleEl)  titleEl.style.color  = c.name;
  if (eyebrow)  eyebrow.style.color  = c.picker;
}

function scrollToSelectedPill(code) {
  const wrap = document.querySelector('.team-filter-wrap');
  if (!wrap) return;
  // Find the first pill in the track whose onclick matches the selected code
  const pill = wrap.querySelector(`.team-pill.selected`);
  if (!pill) return;
  const pillCenter = pill.offsetLeft + pill.offsetWidth / 2;
  const target = Math.max(0, pillCenter - wrap.clientWidth / 2);
  wrap.scrollLeft = target;
  pillScrollPos   = target;
}

function toggleTeam(code) {
  selectedTeam = selectedTeam === code ? null : code;
  document.getElementById('btn-all').classList.toggle('active', !selectedTeam && viewMode === 'all');
  document.getElementById('btn-family').classList.toggle('active', !selectedTeam && viewMode === 'family');
  saveState();
  renderHero(selectedTeam);
  renderTeamPills();
  renderTeamPanel(selectedTeam);
  render();
}

function applyPersistedState() {
  document.getElementById('btn-all').classList.toggle('active', !selectedTeam && viewMode === 'all');
  document.getElementById('btn-family').classList.toggle('active', !selectedTeam && viewMode === 'family');
  document.body.classList.toggle('arsenal-mode', arsenalMode);
  document.body.classList.toggle('spurs-mode', spursMode);
  document.body.classList.toggle('chelsea-mode', chelseaMode);
  updateClubBtn();
  setGlobalNewsVisible(!selectedTeam);
  renderHero(selectedTeam);
  syncMobileSelect();
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + activePhase)?.classList.add('active');
}

// ═══════════════════════════════════════════════════════

(async () => {
  loadState();
  try {
    await loadMatchData();
    await loadScoreOverrides();
  } catch(e) {
    document.getElementById('loading-overlay').innerHTML =
      `<span style="font-size:24px">⚠️</span><span>Could not load match data.<br>Make sure you're running via <code>npm run dev</code>.</span>`;
    return;
  }
  loadCachedScores(); // baseline from previous session; API data will overwrite
  document.getElementById('loading-overlay').style.display = 'none';
  applyPersistedState();
  initMobileTeamSelect();
  renderTeamPills();
  renderTeamPanel(selectedTeam);
  render();
  startPillScroll();
  fetchGlobalNews(); // load right-side WC news feed
  fetchScores(); // first fetch also calls schedulePoll()
})();
</script>
